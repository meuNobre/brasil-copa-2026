<!-- =====================================================================
     MUDANÇAS NO index.html
     Substitua o bloco <div id="auth-modal"> pelo abaixo.
     Adicione também a tag <script> do Google GSI no <head>.
     ===================================================================== -->

<!-- 1. Cole isto no <head>, antes do fechamento </head> -->
<script src="https://accounts.google.com/gsi/client" async defer></script>


<!-- 2. Substitua o bloco <div id="auth-modal" ...> pelo abaixo -->
<div id="auth-modal" class="modal-overlay">
  <div class="modal-box">
    <button id="auth-modal-close" class="modal-close" aria-label="Fechar">×</button>

    <div class="auth-tabs">
      <button type="button" id="auth-tab-login"    class="auth-tab active">Entrar</button>
      <button type="button" id="auth-tab-register" class="auth-tab">Criar conta</button>
    </div>

    <!-- Formulário email + senha (igual ao original) -->
    <form id="auth-form" class="auth-form">
      <div id="auth-username-field" class="form-field" style="display:none">
        <label for="auth-username">Nome de usuário</label>
        <input type="text" id="auth-username" name="username" minlength="3" maxlength="20" placeholder="seu_nome">
      </div>
      <div class="form-field">
        <label for="auth-email">Email</label>
        <input type="email" id="auth-email" name="email" required placeholder="voce@email.com">
      </div>
      <div class="form-field">
        <label for="auth-password">Senha</label>
        <input type="password" id="auth-password" name="password" required minlength="6" placeholder="mínimo 6 caracteres">
      </div>
      <div id="auth-error" class="auth-error"></div>
      <button type="submit" id="auth-submit" class="btn-support" style="width:100%">Entrar</button>
    </form>

    <!-- Separador + botão Google -->
    <div id="auth-google-wrapper" class="auth-divider-wrapper">
      <div class="auth-divider"><span>ou</span></div>
      <button id="auth-google-btn" class="btn-google" type="button">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" height="20">
        Entrar com Google
      </button>
    </div>

    <!-- Painel de escolha de username (aparece só para novos usuários Google) -->
    <div id="auth-google-username-panel" style="display:none" class="auth-form">
      <p class="auth-google-username-title">Escolha um nome de usuário para sua conta</p>
      <div class="form-field">
        <label for="auth-google-username-input">Nome de usuário</label>
        <input type="text" id="auth-google-username-input" minlength="3" maxlength="20" placeholder="seu_nome">
      </div>
      <div id="auth-google-username-error" class="auth-error"></div>
      <button id="auth-google-username-confirm" class="btn-support" type="button" style="width:100%">Confirmar</button>
    </div>

  </div>
</div>
